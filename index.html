const state = {

function deepMerge(target, source){
  for(const k in source){
    if(source[k] && typeof source[k]==='object' && !Array.isArray(source[k]) && target[k] && typeof target[k]==='object'){
      deepMerge(target[k], source[k]);
    } else {
      target[k] = source[k];
    }
  }
  return target;
}
function save(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){} }
function load(){ try{ const raw = localStorage.getItem(STORAGE_KEY); if(raw) deepMerge(state, JSON.parse(raw)); }catch(e){} }
function getDeep(path){ return path.split('.').reduce((o,k)=>(o?o[k]:undefined), state); }
function setDeep(path, value){ const p=path.split('.'); let o=state; for(let i=0;i<p.length-1;i++) o=o[p[i]]; o[p[p.length-1]]=value; }
function setField(path, value){ setDeep(path,value); save(); render(); }
function setFieldSilent(path, value){ setDeep(path,value); save(); }
function goMenu(m){ state.currentMenu = m; save(); render(); window.scrollTo({top:0, behavior:'smooth'}); }
function escAttr(s){ return String(s).replace(/'/g, "\\'"); }
function targetLabel(){
  return state.soul.target==='other' ? (state.soul.targetName.trim() || '相談者') : 'ご自身';
}
function isOtherTarget(){ return state.soul.target==='other'; }

/* ============ Web Audio（瞑想BGM） ============ */
let audioCtx=null, masterGain=null, activeOsc=[], currentPreviewKey=null, isMainPlaying=false;
function ensureAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = state.volume;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 4500;
    masterGain.connect(filter).connect(audioCtx.destination);
  }
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
function stopAllTones(){
  if(!audioCtx) return;
  const now = audioCtx.currentTime;
  activeOsc.forEach(({osc,gain,extra})=>{
    try{
      gain.gain.cancelScheduledValues(now);
      gain.gain.setValueAtTime(gain.gain.value, now);
      gain.gain.linearRampToValueAtTime(0.0001, now+0.6);
      osc.stop(now+0.7);
      (extra||[]).forEach(o=>{ try{ o.stop(now+0.7); }catch(e){} });
    }catch(e){}
  });
  activeOsc = [];
  currentPreviewKey = null;
  isMainPlaying = false;
}
function playTones(freqs){
  stopAllTones();
  const ctx = ensureAudio();
  const now = ctx.currentTime;
  freqs.forEach((f)=>{
    const toneGain = ctx.createGain();
    toneGain.gain.value = 0.0001;
    toneGain.connect(masterGain);

    const osc1 = ctx.createOscillator(); osc1.type='sine';     osc1.frequency.value=f;
    const osc2 = ctx.createOscillator(); osc2.type='sine';     osc2.frequency.value=f*1.004;
    const osc3 = ctx.createOscillator(); osc3.type='triangle'; osc3.frequency.value=f*2;

    const g1 = ctx.createGain(); g1.gain.value=0.55;
    const g2 = ctx.createGain(); g2.gain.value=0.35;
    const g3 = ctx.createGain(); g3.gain.value=0.18;

    osc1.connect(g1).connect(toneGain);
    osc2.connect(g2).connect(toneGain);
    osc3.connect(g3).connect(toneGain);

    const lfo = ctx.createOscillator(); lfo.type='sine'; lfo.frequency.value=0.06;
    const lfoGain = ctx.createGain(); lfoGain.gain.value=2.5;
    lfo.connect(lfoGain).connect(osc1.frequency);
    lfo.connect(lfoGain).connect(osc2.frequency);

    [osc1,osc2,osc3,lfo].forEach(o=>o.start(now));
    toneGain.gain.linearRampToValueAtTime(0.16/freqs.length+0.05, now+2.2);
    activeOsc.push({osc:osc1, gain:toneGain, extra:[osc2,osc3,lfo]});
  });
}
function setVolume(v){
  state.volume = parseFloat(v);
  save();
  if(masterGain) masterGain.gain.value = state.volume;
}
function toggleMainBGM(){
  if(isMainPlaying){ stopAllTones(); }
  else { playTones(MAIN_KEYS.map(k=>CHAKRAS.find(c=>c.key===k).freq)); isMainPlaying=true; }
  render();
}
function togglePreview(key,freq){
  if(currentPreviewKey===key){ stopAllTones(); }
  else { playTones([freq]); currentPreviewKey=key; }
  render();
}

/* ============ プロンプト生成 ============ */
function buildSoulPrompt(){
  const s = state.soul;
  const other = isOtherTarget();
  const label = targetLabel();
  const trainingDesc = other ? `相談者（${label}）を対象に行った霊視トレーニング` : 'ご自身を対象に行ったセルフ霊視トレーニング';
  let p = `あなたは経験豊富なスピリチュアルカウンセラーです。
以下は、鑑定士が「魂を視るワーク」で行った${trainingDesc}の回答記録です。この記録をもとに、鑑定対象専用の「魂の鑑定文」を作成してください。

【セッション記録（ソウルシルエットを凝視した直後の直感回答）】
・鑑定対象：${other ? `相談者（${label}）` : 'ご本人（自分自身）'}
・明暗：${s.brightness || '未回答'}
・温度感：${s.temperature || '未回答'}
・重さ：${s.weight || '未回答'}
・色：${s.color || '未回答'}
・今の魂のテーマ（感情）：${s.theme || '未回答'}
・その他見えたもの・感じたこと：${s.other || '未回答'}

【鑑定文作成の必須ルール】
1. 鑑定文は必ず「あなたの魂を霊視させていただきました。」という一文から書き始めること。
2. 文中の「あなた」という呼びかけは、常に鑑定対象（${other ? label : 'ご本人'}）に向けて書かれているものとすること。鑑定士本人に向けた表現にはしないこと。
3. 文体はバーナム効果を意識し、誰にでも当てはまりうる普遍的な人間心理・人生の機微を、「まるであなただけに向けて語っているかのように」自然で温かい日本語で表現すること。
4. 一文一文を短めにし、意味の区切りごとに適切に改行を入れ、スマートフォンでも読みやすいレイアウトにすること。
5. セッション記録の内容を"的中しにいく"姿勢で、断定的かつ具体的な言葉で言い当てるように書くこと（曖昧なぼかし表現を多用しない）。
6. 鑑定対象が自ら行動したくなるよう、背中を押す・行動を促す教唆的な表現を随所に盛り込むこと（例：「〜するタイミングに来ています」「〜を選んでいいのです」「今、動くことを魂は望んでいます」等）。
7. 良い面だけでなく、短所・課題・耳の痛いポイントも必ず織り交ぜ、鑑定に深みとリアリティを持たせること。
8. 強調のためのアスタリスク（**太字**等のMarkdown記法）は一切使用しないこと。プレーンな日本語の文章のみで表現すること。
9. 全体は「魂の状態の読み解き」→「色・温度・重さが示す意味」→「今の魂のテーマ」→「短所・課題」→「今後のアドバイス」の流れで構成し、合計800〜1200文字程度にまとめること。

上記ルールに厳密に従い、鑑定文本文のみを出力してください（前置きや解説は不要です）。`;
  return p;
}
function generateSoulPromptClick(){ state.soul.generatedPrompt = buildSoulPrompt(); save(); render(); }

function copyText(id){
  const ta = document.getElementById(id);
  if(!ta) return;
  navigator.clipboard.writeText(ta.value).then(()=>showToast('コピーしました')).catch(()=>{
    ta.select(); document.execCommand('copy'); showToast('コピーしました');
  });
}
function showToast(msg){
  let t = document.getElementById('toast');
  if(!t){
    t = document.createElement('div');
    t.id='toast';
    t.className='fixed bottom-6 left-1/2 -translate-x-1/2 bg-stone-800 text-white text-sm px-4 py-2 rounded-full shadow-lg z-[100] transition-opacity duration-300';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity='1';
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=>{ t.style.opacity='0'; }, 1800);
}

function card(inner, cls=''){ return `<div class="bg-white rounded-xl shadow-sm p-5 md:p-6 ${cls}">${inner}</div>`; }
function sectionTitle(t, sub=''){ return `<div class="mb-4"><h2 class="text-lg font-medium text-stone-800">${t}</h2>${sub?`<p class="text-sm text-stone-400 mt-1">${sub}</p>`:''}</div>`; }
function purposeBox(why, clear){
  return `<div class="bg-sky-50 rounded-lg p-3 text-xs text-stone-600 leading-relaxed mb-4 space-y-1.5">
    <p><mark class="mk-sky">🎯 なぜやるのか</mark> ${why}</p>
    <p><mark class="mk-green">✅ クリアの目安</mark> ${clear}</p>
  </div>`;
}
function tile(path, value, label){
  const active = getDeep(path) === value;
  const cls = active ? 'bg-orange-100 text-orange-700 ring-2 ring-orange-400' : 'bg-stone-100 text-stone-600 hover:bg-stone-200';
  return `<button type="button" onclick="setField('${path}','${escAttr(value)}')" class="px-4 py-2 rounded-full text-sm transition ${cls}">${label}</button>`;
}
function tileGroup(path, options){
  return `<div class="flex flex-wrap gap-2">${options.map(o=>tile(path,o.v,o.l)).join('')}</div>`;
}
function textInput(path, placeholder=''){
  const v = getDeep(path) || '';
  return `<input type="text" value="${(v+'').replace(/"/g,'&quot;')}" placeholder="${placeholder}" oninput="setFieldSilent('${path}', this.value)" class="w-full border border-stone-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-stone-300"/>`;
}
function textArea(path, placeholder='', rows=3){
  const v = getDeep(path) || '';
  return `<textarea rows="${rows}" placeholder="${placeholder}" oninput="setFieldSilent('${path}', this.value)" class="w-full border border-stone-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-stone-300">${v}</textarea>`;
}
function autoSaveNote(){ return `<p class="text-xs text-stone-400 mt-3">※データはお使いのブラウザに自動保存されます</p>`; }

/* ============ タイマー ============ */
function fmtTime(sec){ const m=Math.floor(sec/60), s=sec%60; return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`; }

let medTimer = {remaining:900, running:false, id:null};
function startMedTimer(){
  if(medTimer.running) return;
  medTimer.running = true;
  playTones(MAIN_KEYS.map(k=>CHAKRAS.find(c=>c.key===k).freq));
  isMainPlaying = true;
  medTimer.id = setInterval(()=>{
    medTimer.remaining--;
    const el = document.getElementById('medTimerDisplay');
    if(el) el.textContent = fmtTime(Math.max(medTimer.remaining,0));
    if(medTimer.remaining<=0){
      clearInterval(medTimer.id); medTimer.running=false; stopAllTones();
      const btn = document.getElementById('medTimerStatus');
      if(btn) btn.textContent = '瞑想が完了しました🌸 お疲れさまでした';
    }
  },1000);
  render();
}
function pauseMedTimer(){ if(medTimer.id) clearInterval(medTimer.id); medTimer.running=false; stopAllTones(); render(); }
function resetMedTimer(){ if(medTimer.id) clearInterval(medTimer.id); medTimer = {remaining:900, running:false, id:null}; stopAllTones(); render(); }

const GAZE_TOTAL = 60;
const GAZE_RING_CIRC = 2 * Math.PI * 47;
let gazeTimer = {remaining:60, running:false, id:null, done:false};
function gazeRingOffset(){
  const ratio = Math.max(gazeTimer.remaining,0) / GAZE_TOTAL;
  return GAZE_RING_CIRC * (1 - ratio);
}
function updateGazeRing(){
  const ring = document.getElementById('gazeRingCircle');
  if(ring) ring.setAttribute('stroke-dashoffset', gazeRingOffset());
}
function startGazeTimer(){
  if(gazeTimer.running) return;
  gazeTimer.running = true;
  playTones(MAIN_KEYS.map(k=>CHAKRAS.find(c=>c.key===k).freq));
  isMainPlaying = true;
  gazeTimer.id = setInterval(()=>{
    gazeTimer.remaining--;
    const el = document.getElementById('gazeTimerDisplay');
    if(el) el.textContent = fmtTime(Math.max(gazeTimer.remaining,0));
    updateGazeRing();
    if(gazeTimer.remaining<=0){
      clearInterval(gazeTimer.id); gazeTimer.running=false; gazeTimer.done=true; stopAllTones();
      render();
    }
  },1000);
  render();
}
function skipGaze(){ if(gazeTimer.id) clearInterval(gazeTimer.id); gazeTimer.done=true; gazeTimer.running=false; stopAllTones(); render(); }

一度メニュー1のチャクラ瞑想に戻り、体の力を抜くことを優先してください。「視なければ」と力むほど、かえって何も浮かびにくくなります。<mark class="mk-sky">浮かばない、というのも一つの結果</mark>として、そのまま記録して大丈夫です。`],
  ['毎回同じ答え（例えば「白」「軽い」）ばかり選んでしまいます', `同じ答えが続くこと自体は間違いではありません。ただ、選ぶ前に一度立ち止まり、「本当に今そう感じたか」「考えずに選んだ習慣になっていないか」を確認してみてください。<br><br>
ソウルシルエットを見つめる時間を少し延ばしたり、深呼吸を1回はさんでから回答すると、その都度の感覚が拾いやすくなります。`],
  ['怖くて途中でやめたくなります。続けても大丈夫ですか？', `無理に続ける必要はありません。少しでも強い恐怖や不快感があるときは、<mark class="mk-rose">いったんワークを中断してグラウンディング</mark>（水を飲む、深呼吸、足裏を意識するなど）を優先してください。<br><br>
体調や気分が落ち着いているタイミングで、少しずつ慣らしていくくらいでちょうど良いです。`],
  ['自分の願望や思い込みが混ざっている気がします。妄想との違いが分かりません', `とても良い気づきです。実はこの区別をつきやすくするために、本教材ではあえて第6チャクラ（直感・イメージ）を使わずに感情・愛・高次元の3チャクラだけでトレーニングしています。<br><br>
それでも迷うときは、「〜であってほしい」という願望から浮かんだものか、「勝手に、唐突に」浮かんできたものかを振り返ってみてください。<mark class="mk-purple">後者のほうが直感由来</mark>である可能性が高いです。記録を積み重ねるほど見分けがつきやすくなります。`],
  ['相談者を視るときと、自分自身を視るときで感覚が違います', `自然なことです。対象が変わればつながる波動も変わるため、感じ方に差が出て当然です。<br><br>
相談者を視るときは、凝視の前に一呼吸おいて、その方のお顔や名前を軽く思い浮かべてから始めると、意識のピントが合いやすくなります。感覚の違いそのものも、大切な情報として記録しておきましょう。`],
  ['色や形が複数同時に浮かんでしまい、一つに絞れません', `無理に一つへ絞る必要はありません。まずは<mark class="mk-orange">最初に浮かんだもの、または一番強く感じたもの</mark>を選択式の回答にし、残りは「その他、見えたもの・感じたこと」の欄にすべて書き出してください。情報が多いことは、むしろ豊かな受信ができているサインです。`],
  ['セッションのあと、体がだるい・疲れることがあります', `感覚を開いたまま日常に戻ると、エネルギーの境界が曖昧になり疲れやすくなることがあります。<br><br>
ワークの後は必ず<mark class="mk-green">グラウンディング</mark>（水を飲む、深呼吸、足裏を意識して立つなど）を行う習慣をつけてください。だるさが続く場合は、無理に毎日行わず間隔をあけましょう。`],
  ['鑑定文の内容が自分（相談者）に当てはまっていない気がします。どう受け止めればいいですか？', `生成された鑑定文は、断定に見えても100％の的中を保証するものではなく、<mark class="mk-sky">気づきのきっかけ</mark>として作られています。<br><br>
すべてを鵜呑みにせず、自分（または相談者）の心に引っかかった部分だけを受け取り、残りは「そういう見方もあるのか」くらいの距離感で扱ってください。回数を重ねるほど、記録と実感のズレも精度が上がっていきます。`],
];

function renderMenu3(){
  const s = state.soul;
  const f = state.feedback;
  const other = isOtherTarget();
  const label = targetLabel();
  const filled = Object.entries(s).filter(([k,v])=>!['generatedPrompt','target','targetName'].includes(k) && v).length;
  const noSessionYet = filled===0;
  const negativeThemes = ['恐れ','絶望','不安','悲しみ','嫉妬','罪悪感','恥','孤独','怒り'];
  const heavyNegative = !noSessionYet && s.brightness==='暗い' && (s.weight==='重い' || negativeThemes.includes(s.theme));

  const anyPattern = f.shapeType || f.wordType || f.inconsistentType || noSessionYet || heavyNegative;

  return `
    <div class="space-y-4 fade-in">
      ${card(`
        ${sectionTitle('フィードバック', 'よくあるケース・疑問にお答えします')}
        <p class="text-sm text-stone-500 mb-3">最初のうちは、うまく霊視できないと感じる方が多くいます。当てはまるものにチェックを入れてみてください。</p>
        <div class="space-y-2">
          <label class="flex items-center gap-2 text-sm text-stone-600">
            <input type="checkbox" ${f.shapeType?'checked':''} onchange="setField('feedback.shapeType', this.checked)"/>
            色ではなく、形で見えてしまう
          </label>
          <label class="flex items-center gap-2 text-sm text-stone-600">
            <input type="checkbox" ${f.wordType?'checked':''} onchange="setField('feedback.wordType', this.checked)"/>
            映像ではなく、言葉としてメッセージが入ってきた
          </label>
          <label class="flex items-center gap-2 text-sm text-stone-600">
            <input type="checkbox" ${f.inconsistentType?'checked':''} onchange="setField('feedback.inconsistentType', this.checked)"/>
            毎回、見える色や形が違って一貫性がない
          </label>
        </div>
      `)}

      ${noSessionYet ? card(`
        <p class="text-sm text-stone-700 leading-relaxed">
          まだセッションが始まっていないようですね。<br><br>
          まずは<mark class="mk-sky">メニュー2「魂を霊視しよう」</mark>で、ソウルシルエットを見ながら直感で答えてみましょう。正解を探す必要はありません。最初に浮かんだものが、あなたにとっての"正解"です。
        </p>
        <button onclick="goMenu('menu2')" class="mt-3 px-4 py-2 rounded-full bg-stone-800 text-white text-sm">メニュー2へ</button>
      `, 'border border-sky-100') : ''}

      ${f.shapeType ? card(`
        <p class="text-sm text-stone-700 leading-relaxed">
          <mark class="mk-orange">これはレアな見え方です。</mark><br><br>
          波動を色ではなく「形質」として捉えていける方です。動物型や幾何学模様など、フォルムとして情報を受け取る感覚は、比較的珍しい回路です。<mark class="mk-green">大切にしていきましょう。</mark><br><br>
          見え方に優劣はありません。色で視える人も形で視える人も、同じように波動を正しく受け取っています。今後は<mark>「〇〇型」</mark>という表記で記録を積み重ねていくと、あなた自身の見え方のクセがどんどん明確になっていきます。
        </p>
      `, 'border border-orange-100') : ''}

      ${f.wordType ? card(`
        <p class="text-sm text-stone-700 leading-relaxed">
          映像として見えなくても、まったく問題ありません。あなたは<mark class="mk-sky">「言語優位」タイプ</mark>の受け取り方をしている可能性が高いです。<br><br>
          このタイプの方は、瞑想の組み立てを少し変えるとぐっと感覚がつかみやすくなります。<br><br>
          ・第6チャクラを使う瞑想ではなく、第5チャクラ（喉／表現）を軽く意識に加えてみてください。<br>
          ・「見ようとする」のではなく、「浮かんできた言葉をそのまま声に出す・書き出す」練習に切り替えてください。<br>
          ・瞑想中に映像を追い求めず、「最初に浮かんだ一言」を疑わずにメモする習慣をつけましょう。<br><br>
          見え方は人それぞれです。あなたに合った回路で受け取れば大丈夫です。
        </p>
      `, 'border border-sky-100') : ''}

      ${f.inconsistentType ? card(`
        <p class="text-sm text-stone-700 leading-relaxed">
          毎回、見え方が変わるのは決しておかしなことではありません。<br><br>
          魂の波動は<mark class="mk-purple">常に一定ではなく、その日のコンディションや心の状態によって揺らぐもの</mark>だからです。今日は色で見え、明日は形で見えることもあります。<br><br>
          一貫性がないことを不安に思うのではなく、<mark class="mk-green">「今日はどう見えたか」を毎回そのまま記録していく</mark>ことが、精度を上げる一番の近道です。時系列で積み重ねていくと、ゆるやかな傾向が見えてきます。
        </p>
      `, 'border border-purple-100') : ''}

      ${heavyNegative ? card(`
        <p class="text-sm text-stone-700 leading-relaxed">
          ここまでの回答が、暗さや重さ、恐れ・不安といった<mark class="mk-rose">"重たい"</mark>印象に偏っていますね。<br><br>
          ${other
            ? `これは、${label}の魂の奥に、まだ整理しきれていない感情が眠っているサインかもしれません。同時に、視ているあなた自身の感情のフィルターが結果に影響している可能性もあります。どちらの要素も否定せず、そのまま記録に残しておきましょう。`
            : `これは、あなたの魂の奥に、まだ整理しきれていない感情が眠っているサインかもしれません。`}
          でも、少し立ち止まって考えてみてください。<br><br>
          本当は見てもいいはずのものを、あなた自身が「見てはいけない」とブロックをかけていませんか。<br><br>
          怖いから見ないのではなく、見て、知って、受け止めることで、その重さは初めて<mark class="mk-rose">"手放せるもの"</mark>に変わっていきます。メニュー1のチャクラ瞑想でグラウンディングしてから、もう一度向き合ってみましょう。
        </p>
        <button onclick="goMenu('menu1')" class="mt-3 px-4 py-2 rounded-full bg-stone-800 text-white text-sm">メニュー1へ</button>
      `, 'border border-rose-100') : ''}

      ${!anyPattern ? card(`
        <p class="text-sm text-stone-500">現時点で特筆すべきブロックは見当たりません。順調にセッションが進んでいます。この調子で、浮かんだままを疑わずに記録していきましょう。</p>
      `) : ''}

      ${card(`
        ${sectionTitle('よくある質問（FAQ）', 'その他、練習中によく寄せられる疑問への回答です')}
        <div class="divide-y divide-stone-100">
          ${FAQS.map(([q,a],i)=>`
            <details class="py-3">
              <summary class="flex items-center justify-between text-stone-700 font-medium text-sm gap-3">
                <span>Q. ${q}</span>
                <span class="text-stone-300 shrink-0">▾</span>
              </summary>
              <div class="mt-3 text-sm leading-relaxed text-stone-600">A. ${a}</div>
            </details>
          `).join('')}
        </div>
      `)}
    </div>
  `;
}

/* ============ ヘッダー & レイアウト ============ */
const MENUS = [
  {k:'menu1', l:'基礎解説＋チャクラ瞑想'},
  {k:'menu2', l:'魂を霊視しよう'},
  {k:'menu3', l:'フィードバック'},
];
function renderHeader(){
  return `
    <header class="sticky top-0 z-40 bg-white/90 backdrop-blur border-b border-stone-200">
      <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between gap-3">
        <div>
          <p class="logo-font text-sm tracking-widest text-stone-400">SOUL VISION</p>
          <p class="text-base font-medium text-stone-800 -mt-0.5">魂を視るワーク教材</p>
        </div>
        <div class="flex flex-col items-end gap-0.5">
          <div class="flex items-center gap-2">
            <button onclick="toggleMainBGM()" class="w-9 h-9 rounded-full bg-stone-100 hover:bg-stone-200 flex items-center justify-center text-stone-600">${isMainPlaying?'⏸':'▶'}</button>
            <input type="range" min="0" max="1" step="0.01" value="${state.volume}" oninput="setVolume(this.value)" class="w-16 accent-stone-500"/>
          </div>
          <p class="text-[10px] text-stone-400">🔊 端末本体の音量も上げてね</p>
        </div>
      </div>
      <nav class="max-w-3xl mx-auto px-4 pb-3 flex gap-2 overflow-x-auto">
        ${MENUS.map(m=>`
          <button onclick="goMenu('${m.k}')" class="px-4 py-1.5 rounded-full text-sm whitespace-nowrap transition ${state.currentMenu===m.k ? 'bg-stone-800 text-white' : 'bg-stone-100 text-stone-500 hover:bg-stone-200'}">${m.l}</button>
        `).join('')}
      </nav>
    </header>
  `;
}
function renderMain(){
  switch(state.currentMenu){
    case 'menu1': return renderMenu1();
    case 'menu2': return renderMenu2();
    case 'menu3': return renderMenu3();
    default: return '';
  }
}
function render(){
  const app = document.getElementById('app');
  app.innerHTML = `
    ${renderHeader()}
    <main class="max-w-3xl mx-auto px-4 py-6 pb-20">
      ${renderMain()}
      <p class="text-center text-xs text-stone-300 mt-10">Relife Spiritual — 魂を視るワーク教材</p>
    </main>
  `;
}

load();
render();
</script>
</body>
</html>
